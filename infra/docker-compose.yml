name: grid

services:
  postgres:
    # Debian variant, not alpine: the alpine image's extracted layers were corrupted
    # by a wedged Docker Desktop on the dev machine (exec format error) and the
    # poisoned snapshot survives pulls. Functionally identical for our use.
    image: postgres:16
    environment:
      POSTGRES_USER: grid
      POSTGRES_PASSWORD: grid
      POSTGRES_DB: grid
    ports:
      # Host 5433: the dev machine runs a native Windows PostgreSQL on 5432.
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grid -d grid']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
